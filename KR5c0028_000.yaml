body:
  text: 太上說轉輪五道宿命因緣經爾時太上老君在迦維羅衛國精舍中與諸天仙地仙仙童玉女等一千二百五十人俱九月長齊一時訖竟從神舍中出往到舍衛國祇樹下給孤獨園二國中間有一大樹名尸俱類髙一千八百六十里枝葉方圓覆六百三十里其樹上有子數千萬石食之甘香其味如蜜甘果熟落人民食之衆病自愈耳目精明吾坐樹下是諸仙等取果食之左玄真人告諸仙等吾觀天地萬物各有宿命因緣諸仙等即前作禮長跪白天尊言曰何等宿命因緣此諸弟子願聞也唯具演說開化未聞真人答曰善哉若有樂聞者一心諦聽道言夫人作福亦如此樹小小漸大收子無限人今生在世豪貴為帝王國主諸侯方伯此人先身從禮拜三寶中來今身為人大富財物無量者此人先身從布施中來今身為人長壽無有疾病者此人先身從持戒中來今身為人端正顔色潔白暉容第一手足柔耎衆人見之皆各喜悅視之無厭者此人先身從忍辱中來今身為人精進無有懈怠者此人先身從福德精進中來今身為人安詳言行審諦者此人先身從精思中來今身為人聰明達解經法讃揚妙法開悟愚蒙人聞其言莫不咨受宣明為珍者此人先身從智慧中來今身為人音聲清徹者此人先身從歌詠三寶中來今身為人潔淨無有疾病者此人先身從慈心中來諸仙等上白天尊曰云何為慈心左玄真人答曰一慈念衆生如母愛子二慈念世間一切衆生各得自在三解道意心常歡喜四為一切不犯衆惡此是為慈心也道言今身為人姝美者此人先身恭敬人故今身為人醜陋者此人先身喜嗔恚故今身為人無所知者此人先身不學問故今身為人顓愚暗塞者此人先身不教人故今身為人瘖痖者此人先身無辜謗毀人故今身為人聾盲者此人先身不喜看經不肯聽經故今身為人奴婢者此人先身負債不償亦不禮三寶故今身為人醜黑者此人先身遮翳光明故今身生在倮國人中者此人先身輕衣裸露唐突精舍故今身生在馬蹄人國中者此人先身布施作福還悔惜心故今身生麞麂鹿中者此人先身意驚恐人故今身墮在龍中者此人先身喜相調戲故今身生惡瘡癩疾難瘥醫藥不治苦毒難言者此人先身無辜鞭打衆生故今身為人所憎人不欲見見不歡悅者此人先身見人不歡喜故今身為人人見歡喜敬念者此人先身見人喜悅故今身為人數遭縣官繫閉牢獄節核其身枷鎖在體者此人先身無辜籠罩擊縛衆生不得縱意故今身為人兔缺者此人先身坐釣魚口缺故如此之罪不可不愼也道言今世愚人聞人好言善語心不樂聞於中兩舌亂人非是者此人後世當作㿯音答耳狗若世人聞經心不聽採者後生當墮驢中若世人慳貪獨食者後生隨餓鬼之中得生出世或為獨身或為人貧窮飢餓衣不蓋形食不供口若世人好食自噉惡食施人者後死當作豬㹠蜣蜋之中若世人劫奪人財物生剝脫人衣服者後死當墮羊中人還生剝其皮償其宿罪若世人喜殺一生捕魚者後死為水上蜉蝣之蟲朝生暮死若世人無辜盜取人財物者後死出世當生奴婢牛馬之中若世人喜淫人婦女不避三光者死徑入地獄之中男抱銅柱女卧鐵牀後得出世必生雞鴨之中若世人好妄語傳人善事以作惡言者死徑入地獄洋銅灌口拔出其舌以牛犁之後得生世當作鴟梟惡鳥人聞其聲莫不驚怖皆言變怪衆口呪之必令其死若世人喜酒耽醉者杞三十六失死墮泥犁之中後生出世愚癡甚無所知若世人夫婦不相和順數共鬪爭更相驅遣者後生墮鳩鴿之中若世人貪人力者後生當作象形道言若世人為州郡令長者廩食於官奉於䘵爵或私侵於民鞭打捶杖逼强輸送告訴無所考劾繫録不得寬縱此人罪重死徑入地獄之中神經百痛數千萬劫罪畢出世當作水牛貫穿其鼻牽車挽重大棒打之償其宿罪道言今身為人不沐浴者此人先身從豬㹠蜣蜋中來今身為人慳貪不讓譏辭多聲者此人先身從惡狗中來今身為人狠戾自用意者此人先身從羊中來今身為人言不安詳不能忍事者此人先身從獼猴中來今身為人身體腥臭者此人先身從魚鱉中來今身為人趨惡行毒心者此人先身從蝮蛇中來今身為人好作美食殺害衆生無有慈心者此人先身從豺狼虎豹中來今身生在邊方六夷國中者此人先身不信道法故今身為人背傴者此人先身禮拜三寶不申背故今身為人疾病多有針灸者此人先身作大醫師為人針灸或瘥或劇而無功效便取他物直之故道言今身為人安序文身直理多智開暢妙義人所尊貴者此人先身宣通真義從諸天中來今身為人學問清徹聰明不貪者此人先身積福無量劫中來今身為人潔白花色了了者此人先身常喜持幡華奉上三寶中來今身為人身體口氣香潔者此人先身行無有過口無有惡今故如此也今身為人被燒死者此人先身常喜放火燒殺衆生之故今身為人溺水死者此人先身無辜以衆生投擲水中故今身為人自縊死者此人先身無辜以繩索繫衆生故今身為人被遭惡虎毒蛇死者此人先身無辜受貨殺人故今身為人被天雷霹靂死者此人先身為行多惡欺罵長者陵慢父母汚穢三光故今身為人孤獨至老無有兒子者此人先身常隂懷惡憎𡜍他人兒孫故今身為人生而短命胞胎傷墮出世未巳而早天終在三塗數千萬劫可得出也道言今身為人眼目眇者此人先身常不喜看經文收拭老人眼目中來今身為人巧匠興造觀治工巧者此人先身從諸天宫殿中來今身為人明徹解了妙音者此人先身常喜聽受經法教人中來今身為人盲聾六根不具者此人常好狎人及衆生故今身為人早失父母孤獨者此人先身殺人父母故生於分離各異鄉土為人下賤奴婢驅使者此人先身常好作劫賊或破人家或要路斷道捉人打拍縳束轉賣使人父母懊惱肝心寸絶至死無益今償宿罪如此之故左玄真人曰吾見宿世以來罪福如此明可愼之道言凡人作功德者皆應身自行香福食及以轉經不請人食而不盡願者如借人食豈自得飽者乎善思作福為惠也左玄真人曰燒香行道齊戒誦經然燈續明盡願以為常法布施得福並達智慧無所罣礙諸神將接萬惡皆消衆魔不敢復當懈怠之人無有精進心者一朝疾病無有吉利方欲燒香便云作福諸惡以降衆魔守前競來作諸變怪以是之故常當精進罪福隨人如影響也道言植種福田如尸俱類樹本種幾根也諸仙等即前作禮上白太上言本一根小小漸大收子無限太上語諸仙曰施一得萬倍言豈虛也道乃頌曰賢者好布施天神自扶將施一得萬倍安樂壽命長今日施善人其福不可量皆當得仙道度脫諸十方太上告諸仙人等世人無智生死肉眼不知罪福吾以道眼覩無數劫來至于今日罪福報應由如掌中視寶珠琉璃內外無有狐疑諸天仙人等即起整頓衣服作禮上白太上曰演說斯義未能解悟願賜開諭太上曰此名為五道輪轉宿命因緣報應經若善男子善女人能誦詠宣傳者功德無量是時左玄真人與諸天仙人等世間人民聞說是經皆大歡喜因緣各起圍繞三匝稽首作禮而退太上說轉輪五道宿命因緣經
