front:
  text: 太上說轉輪五道宿命因緣經爾時太上老君在迦維羅衛國精舍中與諸天仙地仙仙童玉女等一千二百五十人俱九月長齋一時訖竟從神舍中出往到舍衞國祇樹下給孤獨園二國中間有一大樹名尸俱類高一千八百六十里枝葉方圓覆六百三十里其樹上有子數千萬石食之甘香其味如密甘果熟落人民食之眾病自愈耳目精明吾坐樹下是諸仙等取果食之左元眞人告諸仙等吾觀天地萬物各有宿命因緣諸仙等卽前作禮長跪白天尊言曰何等宿命因緣此諸弟子願聞也唯具演說開化未聞眞人答曰善哉若有樂聞者一心諦聽道言夫人作福亦如此樹小小漸大收子無限人今生在世豪貴爲帝王國主諸侯方伯此人先身從禮拜三寶中來今身爲人大富財物無量者此人先身從布施中來今身爲人長壽無有疾病者此人先身從持戒中來今身爲人端正顔色潔白暉容第一手足柔耎眾人見之皆各喜悅視之無厭者此人先身從忍辱中來今身爲人精進無有懈怠者此人先身從福德精進中來今身爲人安詳言行審諦者此人先身從精思中來今身爲人聰明達解經法讚揚妙法開悟愚蒙人聞其言莫不諮受宣明爲珍者此人先身從智慧中來今身爲人音聲清徹者此人先身從歌詠三寶中來今身爲人潔淨無有疾病者此人先身從慈心中來諸仙等上白天尊曰云何爲慈心左元眞人答曰一慈念眾生如母愛子二慈念世間一切眾生各得自在三解道意心常歡喜四爲一切不犯眾惡此是爲慈心也道言今身爲人姝美者此人先身恭敬人故今身爲人醜陋者此人先身喜嗔恚故今身爲人無所知者此人先身不學問故今身爲人顓愚闇塞者此人先身不教人故今身爲人瘖瘂者此人先身無辜謗毀人故今身爲人聾盲者此人先身不喜看經不肯聽經故今身爲人奴婢者此人先身負債不償亦不禮三寶故今身爲人醜黑者此人先身遮翳光明故今身生在倮國人中者此人先身輕衣裸露唐突精舍故今身生在馬蹄人國中者此人先身布施作福還悔惜心故今身生麞麂鹿中者此人先身意驚恐人故今身墮在龍中者此人先身喜相調戲故今身生惡瘡癩疾難瘥醫藥不治苦毒難言者此人先身無辜鞭打眾生故今身爲人所憎人不欲見見不歡悅者此人先身見人不歡喜故今身爲人人見歡喜敬念者此人先身見人喜悅故今身爲人數遭縣官繫閉牢獄節核其身枷鎖在體者此人先身無辜籠罩繫縛眾生不得縱意故今身爲人兔缺者此人先身坐釣魚口故如此之罪不可不愼也道言今世愚人聞人善言好語心不樂聞於中兩舌亂人是非者此人後世當作㿯音答耳狗若世人聞經心不聽採者後生當墮驢中若世人慳貪獨食者後生墮餓鬼之中得生出世或爲獨身或爲人貧窮飢餓衣不蓋形食不供口若世人好食自噉惡食施人者後死當作豬㹠蜣蜋之中若世人劫奪人財物生剝脫人衣服者後死當墮羊中人還生剝其皮償其宿罪若世人喜殺一生捕魚者後死為水上蜉蝣之蟲朝生暮死若世人無辜盜取人財物者後死出世當生奴婢牛馬之中若世人喜淫人婦女不避三光者死逕入地獄之中男抱銅柱女臥鐵牀後得出世必生鷄鴨之中若世人好妄語傳人善事以作惡言者死逕入地獄洋銅灌口拔出其舌以牛犁之後得生世當作鴟梟惡鳥人聞其聲莫不驚怖皆言變恠眾口咒之必令其死若世人喜酒躭醉者犯三十六失死墮泥犁之中後生出世愚癡甚無所知若世人夫婦不相和順數共鬭爭更相驅遣者後生墮鳩鴿之中若世人貪人力者後生當作象形道言若世人爲州郡令長者廩食於官奉於祿爵或私侵於民鞭打捶杖逼强輸送告訴無所考劾繫錄不得寛縱此人罪重死逕入地獄之中神經百痛數千萬劫罪畢出世當作水牛貫穿其鼻牽車挽重大棒打之償其宿罪道言今身爲人不沐浴者此人先身從豬㹠蜣蜋中來今身爲人慳貪不讓譏辭多聲者此人先身從惡狗中來今身爲人狠戾自用意者此人先身從羊中來今身爲人言不安詳不能忍事者此人先身從獼猴中來今身為人身體腥臭者此人先身從魚鱉中來今身為人趨惡行毒心者此人先身從蝮蛇中來今身爲人好作美食殺害眾生無有慈心者此人先身從犲狼虎豹中來今身生在邊方六夷國中者此人先身不信道法故今身爲人背傴者此人先身禮拜三寶不申背故今身爲人疾病多有鍼灸者此人先身作大醫師爲人鍼灸或瘥或劇而無功効便取他物直之故道言今身爲人安序文身直理多智開暢妙義人所尊貴者此人先身宣通眞義從諸天中來今身為人學問清徹聰明不貪者此人先身積福無量劫中來今身爲人潔白花色了了者此人先身常喜持旛華奉上三寶中來今身爲人身體口氣香潔者此人先身行無有過口無有惡今故如此也今身爲人被燒死者此人先身常喜放火燒殺眾生之故今身爲人溺水死者此人先身無辜以眾生投擲水中故今身爲人自縊死者此人先身無辜以繩索繫眾生故今身爲人被遭惡虎毒蛇死者此人先身無辜受貨殺人故今身爲人被天雷霹靂死者此人先身爲行多惡欺罵長者陵慢父母汚穢三光故今身爲人孤獨至老無有兒子者此人先身常陰懷惡憎𡜍他人兒孫故今身爲人生而短命胞胎傷墮出世未已而早夭終在三塗數千萬劫可得出也道言今身爲人眼目眇者此人先身常不喜看經文收拭老人眼目中來今身爲人巧匠興造觀治工巧者此人先身從諸天宮殿中來今身爲人明徹解了妙音者此人先身常喜聽受經法教人中來今身爲人盲聾六根不具者此人常好狎人及眾生故今身爲人早失父母孤獨者此人先身殺人父母故生於分離各異鄕土爲人下賤奴婢驅使者此人先身常好作劫賊或破人家或要路斷道捉人打拍縛束轉賣使人父母懊惱肝心寸絶至死無益今償宿罪如此之故左元眞人曰吾見宿世以來罪福如此明可愼之道言凡人作功德者皆應身自行香福食及以轉經不請人食而不盡願者如借人食豈自得飽者乎善思作福爲惠也左元眞人曰燒香行道齋戒誦經然燈續明盡願以爲常法布施得福並達智慧無所罣礙諸神將接萬惡皆消眾魔不敢侵當解怠之人無有精進心者一朝疾病無有吉利方欲燒香便云作福諸惡以降眾魔守前競來作諸變恠以是之故常當精進罪福隨人如影響也道言植種福田如尸俱類樹本種幾根也諸仙等卽前作禮上白太上言本一根小小漸大收子無限太上語諸仙曰施一得萬倍言豈虛也道乃頌曰賢者好布施天神自扶持施一得萬倍
