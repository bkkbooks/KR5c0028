body:
  text: 安樂壽命長今日施善人其福不可量皆當得仙道度脫諸十方太上告諸仙人等世人無智生死肉眼不知罪福吾以道眼覩無數劫來至於今日罪福報應由如掌中視寶珠瑠璃內外無有狐疑諸天仙人等卽起整頓衣服作禮上白太上曰演說斯義未能解悟願賜開諭太上曰此名爲五道輪轉宿命因緣報應經若善男子善女人能誦詠宣傳者功德無量是時左元眞人與諸天仙人等世間人民聞說是經皆大歡喜因緣各起圍繞三帀稽首作禮而退太上說轉輪五道宿命因緣經
  hash: sha256:94413ae2554e2dc350294b0acafff1991caa1aaa55cd9e7237a2894570f959df
